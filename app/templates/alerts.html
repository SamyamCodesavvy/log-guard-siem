<!-- app/templates/alerts.html -->
{% extends 'base.html' %}
{% block title %}Alerts — LogGuard{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Alerts</h1>

<div class="bg-gray-800 rounded-lg p-4 mb-4 grid grid-cols-2 md:grid-cols-4 gap-3">
  <input id="fHost" placeholder="Hostname"
    class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm outline-none focus:border-blue-500">
  <select id="fSeverity" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm outline-none focus:border-blue-500">
    <option value="">All severities</option>
    <option value="critical">Critical</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
  <select id="fStatus" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm outline-none focus:border-blue-500">
    <option value="">All statuses</option>
    <option value="open">Open</option>
    <option value="investigating">Investigating</option>
    <option value="resolved">Resolved</option>
    <option value="false_positive">False Positive</option>
  </select>
  <button onclick="loadAlerts()" class="bg-blue-600 hover:bg-blue-500 rounded px-3 py-2 text-sm">Apply</button>
</div>

<div class="bg-gray-800 rounded-lg overflow-x-auto">
  <table class="w-full text-sm">
    <thead class="bg-gray-900 text-gray-400">
      <tr>
        <th class="p-3 text-left">Time</th>
        <th class="p-3 text-left">Rule</th>
        <th class="p-3 text-left">Severity</th>
        <th class="p-3 text-left">Status</th>
        <th class="p-3 text-left">Host</th>
        <th class="p-3 text-left">IP / User</th>
      </tr>
    </thead>
    <tbody id="alertsBody"></tbody>
  </table>
  <div id="alertsEmpty" class="hidden text-center text-gray-500 py-8">No alerts match these filters</div>
</div>

<div id="alertModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
  <div class="bg-gray-800 border border-orange-500 rounded-lg max-w-xl w-full p-6">
    <div class="flex justify-between items-start mb-4">
      <h3 class="text-lg font-bold">Alert Detail</h3>
      <button onclick="closeAlertModal()" class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
    </div>
    <div id="alertModalBody" class="space-y-2 text-sm"></div>
    <div class="mt-5 border-t border-gray-700 pt-4">
      <div class="text-gray-400 text-xs mb-2">Update status</div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="resolveAlert('investigating')" class="bg-yellow-700 hover:bg-yellow-600 rounded px-3 py-1.5 text-xs">Mark Investigating</button>
        <button onclick="resolveAlert('resolved')" class="bg-green-700 hover:bg-green-600 rounded px-3 py-1.5 text-xs">Mark Resolved</button>
        <button onclick="resolveAlert('false_positive')" class="bg-gray-600 hover:bg-gray-500 rounded px-3 py-1.5 text-xs">False Positive</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentAlertId = null;

function severityBadge(sev) {
  const colors = { critical: 'bg-red-900 text-red-300', high: 'bg-orange-900 text-orange-300',
    medium: 'bg-yellow-900 text-yellow-300', low: 'bg-blue-900 text-blue-300' };
  return `<span class="px-2 py-0.5 rounded text-xs ${colors[sev] || ''}">${sev}</span>`;
}
function statusBadge(st) {
  const colors = { open: 'bg-red-900 text-red-300', investigating: 'bg-yellow-900 text-yellow-300',
    resolved: 'bg-green-900 text-green-300', false_positive: 'bg-gray-700 text-gray-300' };
  return `<span class="px-2 py-0.5 rounded text-xs ${colors[st] || ''}">${st.replace('_', ' ')}</span>`;
}

async function loadAlerts() {
  const params = new URLSearchParams();
  const sev = document.getElementById('fSeverity').value;
  const status = document.getElementById('fStatus').value;
  const host = document.getElementById('fHost').value.trim();
  if (sev) params.set('severity', sev);
  if (status) params.set('status', status);
  params.set('limit', '100');

  const res = await authFetch(`/alerts/?${params.toString()}`);
  let alerts = await res.json();
  if (host) alerts = alerts.filter(a => (a.hostname || '').toLowerCase().includes(host.toLowerCase()));
  renderAlerts(alerts);
}

function renderAlerts(alerts) {
  const body = document.getElementById('alertsBody');
  const empty = document.getElementById('alertsEmpty');
  if (!alerts.length) {
    body.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  body.innerHTML = alerts.map(a => `
    <tr class="border-t border-gray-700 hover:bg-gray-700 cursor-pointer" onclick="openAlertModal(${a.id})">
      <td class="p-3 text-gray-400 text-xs whitespace-nowrap">${new Date(a.timestamp).toLocaleString()}</td>
      <td class="p-3 font-medium">${a.rule_name}</td>
      <td class="p-3">${severityBadge(a.severity)}</td>
      <td class="p-3">${statusBadge(a.status)}</td>
      <td class="p-3">${a.hostname || '-'}</td>
      <td class="p-3 text-xs font-mono">${a.source_ip || '-'} ${a.username ? '/ ' + a.username : ''}</td>
    </tr>`).join('');
}

async function openAlertModal(id) {
  currentAlertId = id;
  const res = await authFetch(`/alerts/${id}`);
  const a = await res.json();
  document.getElementById('alertModalBody').innerHTML = `
    <div class="grid grid-cols-2 gap-3">
      <div><span class="text-gray-400">Rule:</span> ${a.rule_name}</div>
      <div><span class="text-gray-400">Severity:</span> ${severityBadge(a.severity)}</div>
      <div><span class="text-gray-400">Status:</span> ${statusBadge(a.status)}</div>
      <div><span class="text-gray-400">Time:</span> ${new Date(a.timestamp).toLocaleString()}</div>
      <div><span class="text-gray-400">Host:</span> ${a.hostname || '-'}</div>
      <div><span class="text-gray-400">Assigned:</span> ${a.assigned_to || 'Unassigned'}</div>
      <div><span class="text-gray-400">Source IP:</span> <span class="font-mono">${a.source_ip || '-'}</span></div>
      <div><span class="text-gray-400">Username:</span> ${a.username || '-'}</div>
    </div>
    <div class="mt-3">
      <div class="text-gray-400 mb-1">Description</div>
      <div class="bg-gray-900 rounded p-3 text-xs">${a.description || '-'}</div>
    </div>
    <div class="mt-3">
      <a href="/ui/logs?ip=${a.source_ip || ''}" class="text-blue-400 text-xs hover:underline">View related logs →</a>
    </div>`;
  document.getElementById('alertModal').classList.remove('hidden');
}

async function resolveAlert(status) {
  if (!currentAlertId) return;
  await authFetch(`/alerts/${currentAlertId}/resolve`, {
    method: 'PUT',
    body: JSON.stringify({ status }),
  });
  closeAlertModal();
  loadAlerts();
}

function closeAlertModal() {
  document.getElementById('alertModal').classList.add('hidden');
  currentAlertId = null;
}

document.getElementById('fHost').addEventListener('input', () => {
  clearTimeout(window._t);
  window._t = setTimeout(loadAlerts, 300);
});

const urlParams = new URLSearchParams(window.location.search);
loadAlerts().then(() => {
  if (urlParams.get('open')) openAlertModal(urlParams.get('open'));
});
</script>
{% endblock %}
