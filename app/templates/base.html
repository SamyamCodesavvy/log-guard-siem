<!-- app/templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LogGuard SIEM{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/static/js/auth.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <nav class="bg-gray-800 border-b border-blue-500 px-6 py-3 flex items-center gap-6">
    <span class="text-blue-400 font-bold text-xl">🛡 LogGuard</span>
    <a href="/ui/dashboard" class="hover:text-blue-400">Dashboard</a>
    <a href="/ui/logs" class="hover:text-blue-400">Logs</a>
    <a href="/ui/alerts" class="hover:text-blue-400">Alerts</a>
    <span class="ml-auto flex items-center gap-3 text-sm text-gray-400">
      <span id="navUser"></span>
      <button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>
    </span>
  </nav>
  <main class="p-6">
    {% block content %}{% endblock %}
  </main>

  <script>
    requireAuth();
    const u = currentUser();
    if (u) document.getElementById('navUser').textContent = `${u.username} (${u.role})`;
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
